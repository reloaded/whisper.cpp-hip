name: build

# Real ROCm/HIP image build WITHOUT publishing — proves the image
# actually compiles in CI. The GHCR push happens ONLY on a version tag
# (release.yml); this workflow never publishes.
#
# Triggers:
#   - workflow_dispatch: build on demand against ANY branch
#     (`gh workflow run build.yml --ref <branch>`), optionally
#     overriding the pinned ARGs.
#   - pull_request: EVERY PR runs the full build (push:false) so a PR's
#     changes are proven to compile before merge.
#   - push to main: post-merge sanity build of main.
on:
  workflow_dispatch:
    inputs:
      rocm_version:
        description: "ROCm version (overrides Dockerfile ARG default)"
        required: false
        default: ""
      whisper_cpp_ref:
        description: "whisper.cpp git ref (overrides Dockerfile ARG default)"
        required: false
        default: ""
      gpu_targets:
        description: "AMDGPU target(s), e.g. gfx1100"
        required: false
        default: ""
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Only forward a build-arg when the dispatch input is non-empty,
      # so the Dockerfile's pinned ARG defaults stay the source of
      # truth for PR/push builds.
      - name: Assemble build args
        id: args
        run: |
          {
            [ -n "${{ inputs.rocm_version }}" ]    && echo "ROCM_VERSION=${{ inputs.rocm_version }}"
            [ -n "${{ inputs.whisper_cpp_ref }}" ] && echo "WHISPER_CPP_REF=${{ inputs.whisper_cpp_ref }}"
            [ -n "${{ inputs.gpu_targets }}" ]     && echo "GPU_TARGETS=${{ inputs.gpu_targets }}"
            true
          } > /tmp/bargs
          {
            echo 'build-args<<EOF'
            cat /tmp/bargs
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Build image (linux/amd64, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          build-args: ${{ steps.args.outputs.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
