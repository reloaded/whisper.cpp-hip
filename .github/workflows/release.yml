name: release

# Tag-driven release: pushing a semver tag (vX.Y.Z) builds the
# ROCm/HIP image and pushes it to GHCR. No manual image pushes.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

env:
  # GHCR package (cleaned of the repo name's leading dash). The
  # Dockerfile ARG defaults are the source of truth for ROCm /
  # whisper.cpp / GPU pins; override here only to publish a variant.
  IMAGE: ghcr.io/reloaded/whisper-cpp-hip

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # vX.Y.Z -> X.Y.Z, X.Y, plus latest on the newest tag.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push (linux/amd64 — ROCm has no arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
